name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        env:
          VERSION: dev
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.pull_request.updated_at || github.event.head_commit.timestamp }}
        run: |
          ext=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then ext=".exe"; fi
          ldflags="-X github.com/stage3technical/time-tracker-cli/internal/version.Version=${VERSION} -X github.com/stage3technical/time-tracker-cli/internal/version.Commit=${COMMIT} -X github.com/stage3technical/time-tracker-cli/internal/version.Date=${DATE}"
          go build -ldflags "$ldflags" -o "tt${ext}" ./cmd/tt
          go build -ldflags "$ldflags" -o "tt-ro${ext}" ./cmd/tt-ro
          "./tt${ext}" version
          "./tt-ro${ext}" version
