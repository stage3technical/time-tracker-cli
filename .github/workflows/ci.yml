name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o tt${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/tt
