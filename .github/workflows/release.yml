name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semver tag
        id: semver
        run: |
          chmod +x scripts/next-semver.sh
          TAG=$(./scripts/next-semver.sh)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next tag: $TAG"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.semver.outputs.tag }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag already exists; skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        if: steps.check.outputs.skip == 'false'
        with:
          go-version: "1.22"

      - name: Create and push tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.semver.outputs.tag }}" -m "Release ${{ steps.semver.outputs.tag }}"
          git push origin "${{ steps.semver.outputs.tag }}"

      - name: Build release binaries
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.semver.outputs.tag }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          mkdir -p dist
          ldflags="-s -w -X github.com/stage3technical/time-tracker-cli/internal/version.Version=${VERSION} -X github.com/stage3technical/time-tracker-cli/internal/version.Commit=${COMMIT} -X github.com/stage3technical/time-tracker-cli/internal/version.Date=${DATE}"
          GOOS=linux GOARCH=amd64 go build -ldflags "$ldflags" -o dist/tt-linux-amd64 ./cmd/tt
          GOOS=windows GOARCH=amd64 go build -ldflags "$ldflags" -o dist/tt-windows-amd64.exe ./cmd/tt
          GOOS=darwin GOARCH=arm64 go build -ldflags "$ldflags" -o dist/tt-darwin-arm64 ./cmd/tt

      - name: Create GitHub release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.semver.outputs.tag }}" \
            --title "${{ steps.semver.outputs.tag }}" \
            --notes "Automated release from main. Commit ${{ github.sha }}." \
            dist/tt-linux-amd64 \
            dist/tt-windows-amd64.exe \
            dist/tt-darwin-arm64
